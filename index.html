<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта путешествий — с поиском стран</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Плагин геокодера CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #map {
            width: 100%;
            height: 500px;
            background: #f0f0f0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .country-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .list-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
        }
        .leaflet-control-attribution {
            display: none;
        }
        /* Стили для поиска */
        .leaflet-control-geocoder {
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">🌍 Моя карта путешествий</h1>
        <div class="row">
            <div class="col-md-8">
                <div id="map"></div>
                <div class="d-flex justify-content-between mt-3">
                    <button id="reset-btn" class="btn btn-danger">Сбросить все метки</button>
                    <span>Отмечено стран: <span id="count">0</span></span>
                </div>
            </div>
            <div class="col-md-4">
                <h4>Категории</h4>
                <div class="legend">
                    <div class="legend-item"><span class="category-badge" style="background: #4CAF50;"></span> Посетил</div>
                    <div class="legend-item"><span class="category-badge" style="background: #FFC107;"></span> Хочу посетить</div>
                    <div class="legend-item"><span class="category-badge" style="background: #FF9800;"></span> Жду визу</div>
                    <div class="legend-item"><span class="category-badge" style="background: #F44336;"></span> Вряд ли</div>
                </div>
                <h4>Отмеченные страны</h4>
                <ul id="country-list" class="list-group country-list"></ul>
                <p id="empty-message" class="text-muted mt-3">Кликните по стране на карте</p>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Выберите категорию для <span id="modal-country-name"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-grid gap-2">
                        <button class="btn btn-success category-btn" data-category="visited">✅ Посетил</button>
                        <button class="btn btn-warning category-btn" data-category="wish">⭐ Хочу посетить</button>
                        <button class="btn btn-warning category-btn" style="background-color: #FF9800; border-color: #FF9800; color: white;" data-category="visa">🛂 Жду визу</button>
                        <button class="btn btn-danger category-btn" data-category="never">🚫 Вряд ли посещу</button>
                        <button class="btn btn-secondary category-btn" data-category="">❌ Убрать метку</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Плагин геокодера -->
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    <script>
        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '',
            noWrap: true,
            minZoom: 2,
            maxZoom: 18
        }).addTo(map);

        // ===== ДОБАВЛЯЕМ ПОИСК =====
        // Создаём геокодер с настройками
        const geocoder = L.Control.geocoder({
            defaultMarkGeocode: false, // не ставить маркер автоматически
            placeholder: 'Введите название страны или города...',
            errorMessage: 'Ничего не найдено',
            showResultIcons: true,
            collapsed: false, // всегда развёрнут
            expand: 'click'    // как разворачивать
        }).addTo(map);

        // Обрабатываем результат поиска
        geocoder.on('markgeocode', function(e) {
            // e.geocode содержит результат
            const bbox = e.geocode.bbox;
            const center = e.geocode.center;
            const name = e.geocode.name;
            
            // Если есть границы (bbox) — приближаем к ним
            if (bbox) {
                const bounds = L.latLngBounds(bbox.getSouthWest(), bbox.getNorthEast());
                map.fitBounds(bounds);
            } else {
                // Иначе просто центрируем с зумом 6
                map.setView(center, 6);
            }
            
            // Можно добавить временный маркер (опционально)
            L.marker(center).bindPopup(name).addTo(map);
        });

        const categoryColors = {
            'visited': '#4CAF50',
            'wish': '#FFC107',
            'visa': '#FF9800',
            'never': '#F44336'
        };

        let countriesData = JSON.parse(localStorage.getItem('leafletCountries')) || {};
        let countryNames = {};
        let geojsonLayer = null;
        let currentCountryCode = null;

        const modal = new bootstrap.Modal(document.getElementById('categoryModal'));

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const category = btn.dataset.category;
                if (currentCountryCode) {
                    if (category) {
                        countriesData[currentCountryCode] = category;
                    } else {
                        delete countriesData[currentCountryCode];
                    }
                    saveToStorage();
                    updateUI();
                    updateCountryColor(currentCountryCode, category);
                }
                modal.hide();
            });
        });

        function saveToStorage() {
            localStorage.setItem('leafletCountries', JSON.stringify(countriesData));
        }

        function updateUI() {
            const list = document.getElementById('country-list');
            const emptyMsg = document.getElementById('empty-message');
            list.innerHTML = '';
            const entries = Object.entries(countriesData);
            if (entries.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                entries.sort().forEach(([code, cat]) => {
                    const name = countryNames[code] || code;
                    const color = categoryColors[cat] || '#999';
                    const li = document.createElement('li');
                    li.className = 'list-group-item';
                    li.dataset.code = code;
                    li.innerHTML = `
                        <span>
                            <span class="category-badge" style="background: ${color};"></span>
                            ${name}
                        </span>
                        <button class="btn btn-sm btn-outline-danger remove-country" data-code="${code}">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    list.appendChild(li);
                });
            }
            document.getElementById('count').textContent = entries.length;
        }

        function updateCountryColor(code, category) {
            if (!geojsonLayer) return;
            geojsonLayer.eachLayer(layer => {
                const layerCode = layer.feature.properties.ISO_A3 || layer.feature.properties.iso_a3 || layer.feature.properties.adm0_a3;
                if (layerCode === code) {
                    layer.setStyle({
                        color: category ? categoryColors[category] : '#c0c0c0',
                        weight: 1,
                        fillOpacity: 0.5
                    });
                }
            });
        }

        // Загрузка GeoJSON
        fetch('countries.geojson')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status} — файл не найден`);
                return response.json();
            })
            .then(data => {
                data.features.forEach(f => {
                    const props = f.properties;
                    const code = props.ISO_A3 || props.iso_a3 || props.adm0_a3;
                    const name = props.ADMIN || props.name || props.formal_en || code;
                    if (code) countryNames[code] = name;
                });

                geojsonLayer = L.geoJSON(data, {
                    style: (feature) => {
                        const code = feature.properties.ISO_A3 || feature.properties.iso_a3 || feature.properties.adm0_a3;
                        return {
                            color: countriesData[code] ? categoryColors[countriesData[code]] : '#c0c0c0',
                            weight: 1,
                            fillOpacity: 0.5
                        };
                    },
                    onEachFeature: (feature, layer) => {
                        const props = feature.properties;
                        const code = props.ISO_A3 || props.iso_a3 || props.adm0_a3;
                        const name = props.ADMIN || props.name || props.formal_en || code;

                        layer.on('click', () => {
                            if (!code) {
                                alert('Не удалось определить код страны.');
                                return;
                            }
                            currentCountryCode = code;
                            document.getElementById('modal-country-name').textContent = name;
                            modal.show();
                        });
                    }
                }).addTo(map);

                updateUI();
            })
            .catch(error => {
                console.error('Ошибка загрузки GeoJSON:', error);
                document.getElementById('empty-message').innerHTML = `
                    <div class="alert alert-danger">
                        ❌ Не удалось загрузить countries.geojson.<br>
                        Убедитесь, что файл лежит в корневой папке репозитория.
                    </div>
                `;
            });

        // Удаление из списка
        document.getElementById('country-list').addEventListener('click', (e) => {
            const btn = e.target.closest('.remove-country');
            if (!btn) return;
            const code = btn.dataset.code;
            delete countriesData[code];
            saveToStorage();
            updateUI();
            updateCountryColor(code, null);
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            countriesData = {};
            saveToStorage();
            updateUI();
            if (geojsonLayer) {
                geojsonLayer.eachLayer(layer => {
                    layer.setStyle({ color: '#c0c0c0', weight: 1, fillOpacity: 0.1 });
                });
            }
        });

        updateUI();
    </script>
</body>
</html>
