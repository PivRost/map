<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои путешествия — карта стран</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Поиск на карте -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
    <!-- Bootstrap + иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #map {
            width: 100%;
            height: 500px;
            background: #f0f0f0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .country-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .list-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .leaflet-control-attribution {
            display: none;
        }
        .leaflet-control-geocoder {
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">🌍 Моя карта путешествий</h1>
        <div class="row">
            <div class="col-md-8">
                <div id="map"></div>
                <div class="d-flex justify-content-between mt-3">
                    <button id="reset-btn" class="btn btn-danger">Сбросить всё</button>
                    <span>Отмечено стран: <span id="count">0</span></span>
                </div>
            </div>
            <div class="col-md-4">
                <h4>Категории</h4>
                <div class="legend">
                    <div class="legend-item"><span class="category-badge" style="background: #4CAF50;"></span> Посетил</div>
                    <div class="legend-item"><span class="category-badge" style="background: #FFC107;"></span> Хочу посетить</div>
                    <div class="legend-item"><span class="category-badge" style="background: #FF9800;"></span> Жду визу</div>
                    <div class="legend-item"><span class="category-badge" style="background: #F44336;"></span> Вряд ли</div>
                </div>
                <h4>Отмеченные страны</h4>
                <ul id="country-list" class="list-group country-list"></ul>
                <p id="empty-message" class="text-muted mt-3">Кликни по стране на карте</p>
            </div>
        </div>
    </div>

    <!-- Модалка -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Выбери категорию для <span id="modal-country-name"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-grid gap-2">
                        <button class="btn btn-success category-btn" data-category="visited">✅ Посетил</button>
                        <button class="btn btn-warning category-btn" data-category="wish">⭐ Хочу посетить</button>
                        <button class="btn btn-warning category-btn" style="background-color:#FF9800; border-color:#FF9800; color:#fff;" data-category="visa">🛂 Жду визу</button>
                        <button class="btn btn-danger category-btn" data-category="never">🚫 Вряд ли посещу</button>
                        <button class="btn btn-secondary category-btn" data-category="">❌ Убрать метку</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- Карта ---
        var map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '',
            noWrap: true,
            minZoom: 2,
            maxZoom: 18
        }).addTo(map);

        // --- Поиск мест (чтобы быстро найти страну) ---
        var geocoder = L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: 'Поиск страны или города...',
            errorMessage: 'Ничего не нашел',
            showResultIcons: true,
            collapsed: false
        }).addTo(map);

        geocoder.on('markgeocode', function(e) {
            var bbox = e.geocode.bbox,
                center = e.geocode.center,
                name = e.geocode.name;
            if (bbox) {
                map.fitBounds(L.latLngBounds(bbox.getSouthWest(), bbox.getNorthEast()));
            } else {
                map.setView(center, 6);
            }
            // временная метка
            L.marker(center).bindPopup(name).addTo(map);
        });

        // --- Цвета для категорий ---
        var colors = {
            'visited': '#4CAF50',
            'wish': '#FFC107',
            'visa': '#FF9800',
            'never': '#F44336'
        };

        // --- Данные (localStorage) ---
        var myCountries = JSON.parse(localStorage.getItem('travelMap')) || {};
        var countryNames = {};   // заполнится из geojson
        var geojsonLayer = null;
        var currentCountry = null;

        // --- Модалка ---
        var modal = new bootstrap.Modal(document.getElementById('categoryModal'));

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                var cat = this.getAttribute('data-category');
                if (currentCountry) {
                    if (cat) {
                        myCountries[currentCountry] = cat;
                    } else {
                        delete myCountries[currentCountry];
                    }
                    saveData();
                    refreshList();
                    updateColorOnMap(currentCountry, cat);
                }
                modal.hide();
            });
        });

        // Сохранить
        function saveData() {
            localStorage.setItem('travelMap', JSON.stringify(myCountries));
        }

        // Обновить список справа
        function refreshList() {
            var listEl = document.getElementById('country-list');
            var emptyMsg = document.getElementById('empty-message');
            listEl.innerHTML = '';
            var entries = Object.entries(myCountries);
            if (entries.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
                entries.sort().forEach(([code, cat]) => {
                    var name = countryNames[code] || code;
                    var color = colors[cat] || '#999';
                    var li = document.createElement('li');
                    li.className = 'list-group-item';
                    li.setAttribute('data-code', code);
                    li.innerHTML = `
                        <span>
                            <span class="category-badge" style="background: ${color};"></span>
                            ${name}
                        </span>
                        <button class="btn btn-sm btn-outline-danger remove-country" data-code="${code}">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    listEl.appendChild(li);
                });
            }
            document.getElementById('count').innerText = entries.length;
        }

        // Обновить цвет конкретной страны
        function updateColorOnMap(code, cat) {
            if (!geojsonLayer) return;
            geojsonLayer.eachLayer(function(layer) {
                var layerCode = layer.feature.properties.ISO_A3 || layer.feature.properties.iso_a3 || layer.feature.properties.adm0_a3;
                if (layerCode === code) {
                    layer.setStyle({
                        color: cat ? colors[cat] : '#c0c0c0',
                        weight: 1,
                        fillOpacity: 0.5
                    });
                }
            });
        }

        // Загрузка geojson
        fetch('countries.geojson')
            .then(res => {
                if (!res.ok) throw new Error('Не нашел countries.geojson');
                return res.json();
            })
            .then(data => {
                // запомним названия
                data.features.forEach(f => {
                    var props = f.properties;
                    var code = props.ISO_A3 || props.iso_a3 || props.adm0_a3;
                    var name = props.ADMIN || props.name || props.formal_en || code;
                    if (code) countryNames[code] = name;
                });

                geojsonLayer = L.geoJSON(data, {
                    style: function(feature) {
                        var code = feature.properties.ISO_A3 || feature.properties.iso_a3 || feature.properties.adm0_a3;
                        return {
                            color: myCountries[code] ? colors[myCountries[code]] : '#c0c0c0',
                            weight: 1,
                            fillOpacity: 0.5
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        var props = feature.properties;
                        var code = props.ISO_A3 || props.iso_a3 || props.adm0_a3;
                        var name = props.ADMIN || props.name || props.formal_en || code;

                        layer.on('click', function() {
                            if (!code) {
                                alert('Что-то не так с кодом страны');
                                return;
                            }
                            currentCountry = code;
                            document.getElementById('modal-country-name').innerText = name;
                            modal.show();
                        });
                    }
                }).addTo(map);

                refreshList();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('empty-message').innerHTML = `
                    <div class="alert alert-danger">
                        ❌ Не загрузился countries.geojson.<br>
                        Проверь, что файл лежит рядом.
                    </div>
                `;
            });

        // Удаление из списка
        document.getElementById('country-list').addEventListener('click', function(e) {
            var btn = e.target.closest('.remove-country');
            if (!btn) return;
            var code = btn.getAttribute('data-code');
            delete myCountries[code];
            saveData();
            refreshList();
            updateColorOnMap(code, null);
        });

        // Сбросить всё
        document.getElementById('reset-btn').addEventListener('click', function() {
            myCountries = {};
            saveData();
            refreshList();
            if (geojsonLayer) {
                geojsonLayer.eachLayer(function(layer) {
                    layer.setStyle({ color: '#c0c0c0', weight: 1, fillOpacity: 0.1 });
                });
            }
        });

        refreshList();
    </script>
</body>
</html>
